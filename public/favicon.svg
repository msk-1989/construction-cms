<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="tower" x1="20" y1="14" x2="44" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Tower crane body (vertical) -->
  <rect x="28" y="10" width="8" height="44" rx="2" fill="url(#tower)" opacity="0.95"/>
  <!-- Crane boom (horizontal) -->
  <rect x="14" y="10" width="36" height="5" rx="2" fill="url(#tower)" opacity="0.95"/>
  <!-- Counter weight -->
  <rect x="14" y="15" width="6" height="4" rx="1" fill="#b45309"/>
  <!-- Crane hook line -->
  <line x1="44" y1="15" x2="44" y2="30" stroke="#fffbeb" stroke-width="1.5"/>
  <!-- Hook -->
  <path d="M42 30 Q42 35 44 35 Q46 35 46 30" stroke="#fffbeb" stroke-width="1.5" fill="none"/>
  <!-- Cable lines -->
  <line x1="18" y1="15" x2="30" y2="10" stroke="#d97706" stroke-width="0.8"/>
  <line x1="46" y1="15" x2="34" y2="10" stroke="#d97706" stroke-width="0.8"/>
  <!-- Base / Ground -->
  <rect x="20" y="52" width="24" height="4" rx="2" fill="#b45309"/>
  <!-- Building silhouette (left) -->
  <rect x="6" y="38" width="12" height="18" rx="1" fill="#92400e" opacity="0.4"/>
  <rect x="8" y="40" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
  <rect x="13" y="40" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
  <rect x="8" y="45" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
  <rect x="13" y="45" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
  <!-- Building silhouette (right) -->
  <rect x="46" y="32" width="12" height="24" rx="1" fill="#92400e" opacity="0.4"/>
  <rect x="48" y="34" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
  <rect x="53" y="34" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
  <rect x="48" y="39" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
  <rect x="53" y="39" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
  <rect x="48" y="44" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
  <rect x="53" y="44" width="3" height="3" rx="0.5" fill="#fffbeb" opacity="0.3"/>
</svg>